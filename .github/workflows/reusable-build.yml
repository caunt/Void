on:
  workflow_call:
    inputs:
      dotnet-version:
        type: string
        required: false
        default: 'latest'
      void-version:
        type: string
        required: true

jobs:
  publish:
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04-arm
            runtime-identifier: linux-arm

          - os: ubuntu-24.04-arm
            runtime-identifier: linux-arm64

          - os: ubuntu-24.04-arm
            runtime-identifier: linux-bionic-arm64

          - os: ubuntu-latest
            runtime-identifier: linux-bionic-x64

          - os: ubuntu-24.04-arm
            runtime-identifier: linux-musl-arm

          - os: ubuntu-24.04-arm
            runtime-identifier: linux-musl-arm64

          - os: ubuntu-latest
            runtime-identifier: linux-musl-x64

          - os: ubuntu-latest
            runtime-identifier: linux-x64

          - os: macos-latest
            runtime-identifier: osx-arm64

          - os: macos-15-intel
            runtime-identifier: osx-x64

          - os: windows-11-arm
            runtime-identifier: win-arm64

          - os: windows-latest
            runtime-identifier: win-x64

          - os: windows-latest
            runtime-identifier: win-x86

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      - name: Build
        # Do not include runtime here
        # error NETSDK1134: Building a solution with a specific RuntimeIdentifier is not supported. If you would like to publish for a single RID, specify the RID at the individual project level instead.
        run: dotnet build --configuration Release /p:Version=${{ inputs.void-version }} ${{ matrix.parameters }}

      - name: Build Platform
        run: dotnet build src/Platform --runtime ${{ matrix.runtime-identifier }} --self-contained --configuration Release /p:DebugType=embedded /p:PublishSingleFile=true /p:GenerateRuntimeConfigurationFiles=false /p:Version=${{ inputs.void-version }} ${{ matrix.parameters }}

      - name: Publish
        run: dotnet publish --runtime ${{ matrix.runtime-identifier }} --self-contained src/Platform --output artifacts --configuration Release --no-build /p:DebugType=embedded /p:PublishSingleFile=true /p:EnableCompressionInSingleFile=true /p:GenerateRuntimeConfigurationFiles=false /p:Version=${{ inputs.void-version }} ${{ matrix.parameters }}

      - name: Save Artifact Suffix
        id: get_suffix
        shell: bash
        run: echo "result=$([[ $RUNNER_OS == Windows ]] && echo .exe)" >> "$GITHUB_OUTPUT"

      - name: Rename Artifact
        shell: bash
        run: mv artifacts/Void.Proxy${{ steps.get_suffix.outputs.result }} artifacts/void-${{ matrix.runtime-identifier }}${{ steps.get_suffix.outputs.result }}

      - name: Upload a Build Artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: void-${{ matrix.runtime-identifier }}${{ steps.get_suffix.outputs.result }}
          path: artifacts/void-${{ matrix.runtime-identifier }}${{ steps.get_suffix.outputs.result }}
          compression-level: 9
          if-no-files-found: error
