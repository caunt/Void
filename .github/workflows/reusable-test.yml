on:
  workflow_call:
    inputs:
      dotnet-version:
        type: string
        required: false
        default: 'latest'
      void-version:
        type: string
        required: true
      skip-tests:
        type: boolean
        required: false
        default: false
      shard-count:
        type: number
        required: false
        default: 16

jobs:
  test-matrix:
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip-tests && !startsWith(github.event_name == 'pull_request' && github.event.pull_request.title || github.event.head_commit.message, 'revert') && !startsWith(github.event_name == 'pull_request' && github.event.pull_request.title || github.event.head_commit.message, 'docs') && !startsWith(github.event_name == 'pull_request' && github.event.pull_request.title || github.event.head_commit.message, 'style') && !startsWith(github.event_name == 'pull_request' && github.event.pull_request.title || github.event.head_commit.message, 'chore') && !startsWith(github.event_name == 'pull_request' && github.event.pull_request.title || github.event.head_commit.message, 'refactor') && !startsWith(github.event_name == 'pull_request' && github.event.pull_request.title || github.event.head_commit.message, 'build') && !startsWith(github.event_name == 'pull_request' && github.event.pull_request.title || github.event.head_commit.message, 'ci') }}
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - id: matrix
        run: |
          unit_operating_systems='[
            "ubuntu-24.04-arm",
            "ubuntu-latest",
            "macos-latest",
            "macos-15-intel",
            "windows-11-arm",
            "windows-latest"
          ]'
          
          # Do not have docker:
          # macos-latest
          # macos-15-intel
          # windows-11-arm
          
          # Itzg does not support windows:
          # windows-latest
          
          # Testcontainers: "Docker image portableminecraftclient:latest has not been created."
          # ubuntu-24.04-arm
          
          integration_operating_systems='[
            "ubuntu-latest"
          ]'
        
          matrix=$(
            jq -cn \
              --argjson unit_operating_systems "$unit_operating_systems" \
              --argjson integration_operating_systems "$integration_operating_systems" \
              --argjson shardCount "${{ inputs.shard-count }}" \
              '{
                include:
                  (
                    [range(0; $shardCount) as $shard | $integration_operating_systems[] as $operating_system | { "test-kind": "integration", "os": $operating_system, "shard": $shard }]
                    +
                    [$unit_operating_systems[] as $unit_operating_systems | { "test-kind": "unit", "os": $unit_operating_systems }]
                  )
              }'
          )
        
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  tests:
    needs: test-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.test-matrix.outputs.matrix) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      - name: Build
        if: ${{ matrix.test-kind == 'unit' }}
        run: dotnet build --configuration Release /p:Version=${{ inputs.void-version }}

      - name: Pull portable-minecraft-client image
        if: ${{ matrix.test-kind == 'integration' }}
        run: docker pull ghcr.io/caunt/portable-minecraft-client:offline

      - name: Create shard filter
        shell: bash
        if: ${{ matrix.test-kind == 'integration' }}
        run: |
          set -euo pipefail

          shard=${{ matrix.shard }}
          total=${{ inputs.shard-count }}
          assignment_dir="$(mktemp -d)"
          tests_file="$assignment_dir/tests.txt"
          assignments_file="$assignment_dir/assignments.tsv"
          trap 'rm -rf "$assignment_dir"' EXIT

          dotnet test tests/Void.IntegrationTests --configuration Release --list-tests \
            | awk '/The following Tests are available:/{started=1; next} started {gsub(/^[ \t]+/, ""); if ($0) print}' \
            | LC_ALL=C sort -u > "$tests_file"

          total_tests=$(wc -l < "$tests_file" | tr -d ' ')

          if [ "$total_tests" -eq 0 ]; then
            echo "No integration tests were discovered."
            echo "HAS_INTEGRATION_TESTS=false" >> "$GITHUB_ENV"
            echo "TEST_FILTER=" >> "$GITHUB_ENV"
            exit 0
          fi

          for (( current_shard = 0; current_shard < total; current_shard++ )); do
            : > "$assignment_dir/shard-$current_shard.txt"
          done

          while IFS= read -r test_name; do
            checksum=$(printf '%s' "$test_name" | cksum | awk '{ print $1 }')
            assigned_shard=$(( checksum % total ))

            printf '%s\t%s\n' "$assigned_shard" "$test_name" >> "$assignments_file"
            printf '%s\n' "$test_name" >> "$assignment_dir/shard-$assigned_shard.txt"
          done < "$tests_file"

          assigned_tests=$(wc -l < "$assignments_file" | tr -d ' ')
          unique_assigned_tests=$(cut -f2- "$assignments_file" | LC_ALL=C sort -u | wc -l | tr -d ' ')

          if [ "$assigned_tests" -ne "$total_tests" ] || [ "$unique_assigned_tests" -ne "$total_tests" ]; then
            echo "Shard assignment check failed."
            echo "Discovered tests: $total_tests"
            echo "Assigned tests: $assigned_tests"
            echo "Unique assigned tests: $unique_assigned_tests"
            echo "Duplicate assignments:"
            cut -f2- "$assignments_file" | LC_ALL=C sort | uniq -d
            exit 1
          fi

          echo "Discovered $total_tests integration tests."

          for (( current_shard = 0; current_shard < total; current_shard++ )); do
            shard_tests=$(wc -l < "$assignment_dir/shard-$current_shard.txt" | tr -d ' ')
            echo "Shard $current_shard/$total: $shard_tests tests"
          done

          current_shard_file="$assignment_dir/shard-$shard.txt"

          if [ ! -s "$current_shard_file" ]; then
            echo "No integration tests assigned to shard $shard/$total."
            echo "HAS_INTEGRATION_TESTS=false" >> "$GITHUB_ENV"
            echo "TEST_FILTER=" >> "$GITHUB_ENV"
            exit 0
          fi

          filter=$(awk '{ print "FullyQualifiedName=" $0 }' "$current_shard_file" | paste -sd '|' -)

          echo "HAS_INTEGRATION_TESTS=true" >> "$GITHUB_ENV"
          echo "TEST_FILTER=$filter" >> "$GITHUB_ENV"

      - name: Run integration shard
        if: ${{ matrix.test-kind == 'integration' && env.HAS_INTEGRATION_TESTS == 'true' }}
        run: dotnet test tests/Void.IntegrationTests --configuration Release --filter "$TEST_FILTER" --logger "console;verbosity=detailed"

      - name: Skip empty integration shard
        if: ${{ matrix.test-kind == 'integration' && env.HAS_INTEGRATION_TESTS != 'true' }}
        run: echo "No integration tests assigned to this shard."

      - name: Upload integration steps
        if: ${{ always() && matrix.test-kind == 'integration' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: integration-steps-${{ matrix.os }}-${{ matrix.shard }}
          path: |
            steps/**
            **/steps/**
          if-no-files-found: ignore
          compression-level: 9

      - name: Run unit tests
        if: ${{ matrix.test-kind == 'unit' }}
        run: dotnet test tests/Void.UnitTests --verbosity normal
