on:
  workflow_call:
    inputs:
      dotnet-version:
        type: string
        required: true
      void-version:
        type: string
        required: true
      skip-tests:
        type: boolean
        required: false
        default: false
      shard-count:
        type: number
        required: false
        default: 16

jobs:
  test-matrix:
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip-tests && !startsWith(github.event_name == 'pull_request' && github.event.pull_request.title || github.event.head_commit.message, 'revert') && !startsWith(github.event_name == 'pull_request' && github.event.pull_request.title || github.event.head_commit.message, 'docs') && !startsWith(github.event_name == 'pull_request' && github.event.pull_request.title || github.event.head_commit.message, 'style') && !startsWith(github.event_name == 'pull_request' && github.event.pull_request.title || github.event.head_commit.message, 'chore') && !startsWith(github.event_name == 'pull_request' && github.event.pull_request.title || github.event.head_commit.message, 'refactor') && !startsWith(github.event_name == 'pull_request' && github.event.pull_request.title || github.event.head_commit.message, 'build') && !startsWith(github.event_name == 'pull_request' && github.event.pull_request.title || github.event.head_commit.message, 'ci') }}
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - id: matrix
        run: |
          operating_systems='[
            "ubuntu-24.04-arm",
            "ubuntu-latest",
            "macos-latest",
            "macos-15-intel",
            "windows-11-arm",
            "windows-latest"
          ]'
    
          matrix=$(
            jq -cn \
              --argjson operating_systems "$operating_systems" \
              --argjson shardCount "${{ inputs.shard-count }}" \
              '{
                include:
                  (
                    [range(0; $shardCount) as $shard | $operating_systems[] as $operating_system | { "test-kind": "integration", "os": $operating_system, "shard": $shard }]
                    +
                    [$operating_systems[] as $operating_system | { "test-kind": "unit", "os": $operating_system }]
                  )
              }'
          )

          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  tests:
    needs: test-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.test-matrix.outputs.matrix) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      - name: Build
        if: ${{ matrix.test-kind == 'unit' }}
        run: dotnet build --configuration Release /p:Version=${{ inputs.void-version }}

      - name: Create shard filter
        shell: bash
        if: ${{ matrix.test-kind == 'integration' }}
        run: |
          filter=$(
            dotnet test tests/Void.IntegrationTests --configuration Release --list-tests \
              | awk '/The following Tests are available:/{started=1; next} started {gsub(/^[ \t]+/, ""); if ($0) print}' \
              | sort -u \
              | awk -v shard=${{ matrix.shard }} -v total=${{ inputs.shard-count }} '((NR - 1) % total) == shard { print "FullyQualifiedName=" $0 }' \
              | paste -sd '|' -
          )

          echo "TEST_FILTER=$filter" >> "$GITHUB_ENV"

      - name: Run integration shard
        if: ${{ matrix.test-kind == 'integration' }}
        run: dotnet test tests/Void.IntegrationTests --configuration Release --filter "$TEST_FILTER"

      - name: Run unit tests
        if: ${{ matrix.test-kind == 'unit' }}
        run: dotnet test tests/Void.UnitTests --verbosity normal
