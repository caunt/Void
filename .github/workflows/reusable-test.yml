on:
  workflow_call:
    inputs:
      dotnet-version:
        type: string
        required: false
        default: 'latest'
      void-version:
        type: string
        required: true
      skip-tests:
        type: boolean
        required: false
        default: false
      shard-count:
        type: number
        required: false
        default: 32

jobs:
  test-matrix:
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip-tests && !startsWith(github.event_name == 'pull_request' && github.event.pull_request.title || github.event.head_commit.message, 'revert') && !startsWith(github.event_name == 'pull_request' && github.event.pull_request.title || github.event.head_commit.message, 'docs') && !startsWith(github.event_name == 'pull_request' && github.event.pull_request.title || github.event.head_commit.message, 'style') && !startsWith(github.event_name == 'pull_request' && github.event.pull_request.title || github.event.head_commit.message, 'chore') && !startsWith(github.event_name == 'pull_request' && github.event.pull_request.title || github.event.head_commit.message, 'refactor') && !startsWith(github.event_name == 'pull_request' && github.event.pull_request.title || github.event.head_commit.message, 'build') && !startsWith(github.event_name == 'pull_request' && github.event.pull_request.title || github.event.head_commit.message, 'ci') }}
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - id: matrix
        run: |
          unit_operating_systems='[
            "ubuntu-24.04-arm",
            "ubuntu-latest",
            "macos-latest",
            "macos-15-intel",
            "windows-11-arm",
            "windows-latest"
          ]'
          
          # Do not have docker:
          # macos-latest
          # macos-15-intel
          # windows-11-arm
          
          # Itzg does not support windows:
          # windows-latest
          
          # Testcontainers: "Docker image portableminecraftclient:latest has not been created."
          # ubuntu-24.04-arm
          
          integration_operating_systems='[
            "ubuntu-latest"
          ]'
        
          matrix=$(
            jq -cn \
              --argjson unit_operating_systems "$unit_operating_systems" \
              --argjson integration_operating_systems "$integration_operating_systems" \
              --argjson shardCount "${{ inputs.shard-count }}" \
              '{
                include:
                  (
                    [range(0; $shardCount) as $shard | $integration_operating_systems[] as $operating_system | { "test-kind": "integration", "os": $operating_system, "shard": $shard }]
                    +
                    [$unit_operating_systems[] as $unit_operating_systems | { "test-kind": "unit", "os": $unit_operating_systems }]
                  )
              }'
          )
        
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  tests:
    needs: test-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.test-matrix.outputs.matrix) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      - name: Build
        if: ${{ matrix.test-kind == 'unit' }}
        run: dotnet build --configuration Release /p:Version=${{ inputs.void-version }}

      - name: Pull portable-minecraft-client image
        if: ${{ matrix.test-kind == 'integration' }}
        run: docker pull ghcr.io/caunt/portable-minecraft-client:offline

      - name: Create shard filter
        shell: bash
        if: ${{ matrix.test-kind == 'integration' }}
        run: |
          filter=$(
            dotnet test tests/Void.IntegrationTests --configuration Release --list-tests \
              | awk '/The following Tests are available:/{started=1; next} started {gsub(/^[ \t]+/, ""); if ($0) print}' \
              | sort -u \
              | awk -v shard=${{ matrix.shard }} -v total=${{ inputs.shard-count }} '((NR - 1) % total) == shard { print "FullyQualifiedName=" $0 }' \
              | paste -sd '|' -
          )

          echo "TEST_FILTER=$filter" >> "$GITHUB_ENV"

      - name: Run integration shard
        if: ${{ matrix.test-kind == 'integration' }}
        run: dotnet test tests/Void.IntegrationTests --configuration Release --filter "$TEST_FILTER" --logger "console;verbosity=detailed"

      - name: Upload integration steps
        if: ${{ always() && matrix.test-kind == 'integration' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: integration-steps-${{ matrix.os }}-${{ matrix.shard }}
          path: |
            steps/**
            **/steps/**
          if-no-files-found: ignore
          compression-level: 9

      - name: Run unit tests
        if: ${{ matrix.test-kind == 'unit' }}
        run: dotnet test tests/Void.UnitTests --verbosity normal
