name: Daily Codex Documentation

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      model:
        description: Optional OpenAI API model. Defaults to CODEX_DEFAULT_MODEL.
        required: false
        type: string

env:
  CODEX_DEFAULT_MODEL: gpt-5.4-mini

jobs:
  document_api:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: latest

      - name: Install Codex CLI
        run: npm i -g @openai/codex

      - name: Authenticate Codex CLI using OpenAI API key
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: printenv OPENAI_API_KEY | codex login --with-api-key

      - name: Improve XML documentation with Codex
        env:
          MODEL: ${{ inputs.model || env.CODEX_DEFAULT_MODEL }}
          PROMPT: |
            # Improve C# XML documentation in exactly 1 place only, limited to the Void.Proxy.Api and Void.Minecraft assemblies.

            First, build the relevant projects, but do not print or read the full build output in the conversation.

            Save the full build output into a temporary file. Extract only warning lines into a second temporary file. Never output the full build log or the full warning list.

            If there are no warnings, exit without making changes.

            Randomly select one warning line from the warning file and read only that warning line.

            If the selected warning is not related to missing or invalid XML documentation, select another random warning line that has not already been checked. Repeat until either:
            - one XML documentation warning is selected
            - there are no unchecked warnings left

            If no XML documentation warning is found, exit without making changes.

            For the exactly 1 selected XML documentation warning, inspect only the target source file and the minimal directly relevant implementation/call-site context needed to document it correctly.

            Add or improve XML documentation only for that one selected location.

            Use only XML documentation tags that are genuinely applicable, including <summary>, <remarks>, <param>, <paramref>, <typeparam>, <typeparamref>, <returns>, <value>, <exception>, <example>, <see>, and <seealso>. Use accurate cref references wherever useful. Use <c> for inline code, <code> for code blocks, and <para> to structure longer remarks. Do not add tags that are not justified by the implementation.

            Write documentation that is precise, technical, and useful to API consumers. Cover actual behavior, nullability, side effects, important edge cases, exception conditions, return value semantics, and usage intent.

            Do not change code behavior. Do not edit more than exactly 1 documentation location.

            After editing, do not run solution build.
        run: codex exec --yolo --model "$MODEL" "$PROMPT"

      - name: Commit changes and open pull request
        env:
          GH_TOKEN: ${{ github.token }}
          BASE_BRANCH: ${{ github.event.repository.default_branch }}
          BRANCH_NAME: codex/docs-${{ github.run_id }}
          PR_BODY: |
            ## Summary
            Automated Codex documentation update for one XML documentation location.

            ## Rationale
            Keeps public API XML documentation precise and useful for consumers.

            ## Changes
            Codex was instructed to improve exactly one XML documentation warning in Void.Proxy.Api or Void.Minecraft.

            ## Verification
            Codex was instructed to build the relevant projects, inspect only extracted warning lines, and skip solution build after editing.

            ## Performance
            Not applicable; documentation-only change.

            ## Risks & Rollback
            Risk is limited to inaccurate documentation. Roll back by reverting the generated PR commit.

            ## Breaking/Migration
            None.

            ## Links
            None.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH_NAME"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "docs(api): 📝 improved XML documentation" -m "Observable behavior change: none; documentation only."
          git push --set-upstream origin "$BRANCH_NAME"
          gh pr create --base "$BASE_BRANCH" --head "$BRANCH_NAME" --title "docs(api): 📝 improved XML documentation" --body "$PR_BODY"
