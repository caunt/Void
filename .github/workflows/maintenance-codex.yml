name: Daily Codex Documentation

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      model:
        description: OpenAI API model. For free tier usage models, see https://platform.openai.com/settings/organization/data-controls/sharing.
        required: true
        default: gpt-5.4
        type: string

jobs:
  document_api:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: latest

      - name: Install Codex CLI
        run: npm i -g @openai/codex

      - name: Authenticate Codex CLI using OpenAI API key
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: printenv OPENAI_API_KEY | codex login --with-api-key

      - name: Improve XML documentation with Codex
        env:
          MODEL: ${{ inputs.model || 'gpt-5.4' }}
          PROMPT: |
            Improve C# XML documentation in exactly 1 place only, limited to the Void.Proxy.API and Void.Minecraft assemblies.

            First, build the relevant projects and check the build warnings for missing XML documentation. If there are any missing docs reported by the build, prioritize adding those instead of editing existing documentation. Only if there are no good missing-doc candidates should you improve existing XML docs.

            Before editing, analyze the real behavior of each chosen member from its implementation and relevant call sites. Document what it actually does, not what its name suggests.

            For the exactly 1 chosen location, add or improve all XML documentation tags that are genuinely applicable, including: <summary>, <remarks>, <param>, <paramref>, <typeparam>, <typeparamref>, <returns>, <value>, <exception>, <example>, <see>, and <seealso>. Use accurate cref references wherever useful. Use <c> for inline code, <code> for code blocks, and <para> to structure longer remarks. Do not add tags that are not justified by the implementation.

            Write documentation that is precise, technical, and useful to API consumers. Cover actual behavior, nullability, side effects, important edge cases, exception conditions, return value semantics, and usage intent. Prefer strong references to related members and types when they improve clarity.

            Do not change code behavior. Do not edit more than exactly 1 documentation location.
        run: codex exec --yolo --model "$MODEL" "$PROMPT"

      - name: Commit changes and open pull request
        env:
          GH_TOKEN: ${{ github.token }}
          BASE_BRANCH: ${{ github.event.repository.default_branch }}
          BRANCH_NAME: codex/docs-${{ github.run_id }}
          PR_BODY: |
            ## Summary
            Automated Codex documentation update for one XML documentation location.

            ## Rationale
            Keeps public API XML documentation precise and useful for consumers.

            ## Changes
            Codex was instructed to improve exactly one XML documentation location in Void.Proxy.API or Void.Minecraft.

            ## Verification
            Codex was instructed to build the relevant projects and use missing XML documentation warnings as the first source of candidates.

            ## Performance
            Not applicable; documentation-only change.

            ## Risks & Rollback
            Risk is limited to inaccurate documentation. Roll back by reverting the generated PR commit.

            ## Breaking/Migration
            None.

            ## Links
            None.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH_NAME"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "docs(api): 📝 improved XML documentation" -m "Observable behavior change: none; documentation only."
          git push --set-upstream origin "$BRANCH_NAME"
          gh pr create --base "$BASE_BRANCH" --head "$BRANCH_NAME" --title "docs(api): 📝 improved XML documentation" --body "$PR_BODY"
